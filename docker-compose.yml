services:           # version: "3.7" kaldırıldı (obsolete)
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - ${DATA_FOLDER}/caddy_config:/config
      - ${DATA_FOLDER}/caddy_config/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - n8n
      - face-aligner

  # ── Face Aligner Service ─────────────────────────────
  # n8n'den HTTP Request node ile çağır: http://face-aligner:8000/align
  face-aligner:
    build:
      context: ${DATA_FOLDER}/face-aligner   # repo'nun klonlandığı path
      dockerfile: Dockerfile
    container_name: face-aligner
    restart: unless-stopped
    # Dışarıya port açmıyoruz — n8n internal network üzerinden erişir.
    # Host'tan test etmek istersen aşağıdaki iki satırı aç:
    # ports:
    #   - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - face_aligner_results:/tmp/face_aligner
    depends_on:
      - n8n
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Cleanup sidecar ──────────────────────────────────
  # Günde bir kez face-aligner sonuçlarını temizler (2 günden eski dosyalar).
  face-aligner-cleanup:
    image: busybox:latest
    restart: unless-stopped
    volumes:
      - face_aligner_results:/tmp/face_aligner
    # Her gün gece 03:00'da çalışır; find ile 2 günden eski klasörleri siler.
    entrypoint: >
      sh -c 'while true; do
        sleep $$(( $(date -d "tomorrow 03:00" +%s 2>/dev/null || echo 86400) - $(date +%s) ));
        echo "[cleanup] Removing job dirs older than 2 days…";
        find /tmp/face_aligner -mindepth 1 -maxdepth 1 -type d -mtime +1 -exec rm -rf {} +;
        echo "[cleanup] Done.";
      done'

volumes:
  caddy_data:
    external: true
  face_aligner_results:
    driver: local


